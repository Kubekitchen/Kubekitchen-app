global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 50000
    user haproxy
    group haproxy
    daemon
    stats socket /run/haproxy/admin.sock mode 660 level admin

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    stats auth admin:kubekitchen@2024
    stats show-legends
    stats show-node

frontend kubekitchen_dev
    bind *:8082
    default_backend dev_backend
    option httplog
    http-request set-header X-Environment dev
    http-request set-header X-Forwarded-Proto http

frontend kubekitchen_prod
    bind *:80
    default_backend prod_backend
    option httplog
    http-request set-header X-Environment prod
    http-request set-header X-Forwarded-Proto http

backend dev_backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server kgateway-dev K8S_NODE_IP:30082 check inter 10s fall 3 rise 2

backend prod_backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server kgateway-prod-1 K8S_NODE_IP:30080 check inter 5s fall 2 rise 3
    server kgateway-prod-2 K8S_NODE_IP_2:30080 check inter 5s fall 2 rise 3 backup