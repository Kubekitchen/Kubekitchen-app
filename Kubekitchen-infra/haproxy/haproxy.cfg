global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# HAProxy Stats Dashboard
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats auth admin:kubekitchen2024
    stats refresh 10s
    stats show-legends
    stats show-node

# ─── Frontend: All traffic → kgateway ─────────────────────
# HAProxy forwards ALL traffic to kgateway NodePort
# kgateway handles path-based routing to microservices
frontend http_front
    bind *:80
    option forwardfor
    http-request add-header X-Forwarded-Proto http
    # Health check endpoint for HAProxy itself
    acl is_health path /haproxy-health
    http-request return status 200 content-type text/plain string "OK" if is_health
    default_backend kgateway_backend

# ─── Backend: kgateway NodePort on both worker nodes ──────
backend kgateway_backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200-404   # Any HTTP response = gateway is alive
    # Both worker nodes - kgateway NodePort 30080
    server k8s-worker1 WORKER1_IP:30080 check inter 10s rise 2 fall 3
    server k8s-worker2 WORKER2_IP:30080 check inter 10s rise 2 fall 3