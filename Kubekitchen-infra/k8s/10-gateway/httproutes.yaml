apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubekitchen-dev-routes
  namespace: kubekitchen-dev
  labels:
    project: kubekitchen
    environment: dev
spec:
  parentRefs:
    - name: kubekitchen-gateway
      namespace: kubekitchen-gateway
      sectionName: http-dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          namespace: kubekitchen-dev
          port: 4001
    - matches:
        - path:
            type: PathPrefix
            value: /api/restaurants
      backendRefs:
        - name: restaurant-service
          namespace: kubekitchen-dev
          port: 4002
    - matches:
        - path:
            type: PathPrefix
            value: /api/menu
      backendRefs:
        - name: menu-service
          namespace: kubekitchen-dev
          port: 4003
    - matches:
        - path:
            type: PathPrefix
            value: /api/orders
      backendRefs:
        - name: order-service
          namespace: kubekitchen-dev
          port: 4004
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          namespace: kubekitchen-dev
          port: 80
---
