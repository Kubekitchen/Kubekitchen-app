# ─── Auth Service Route ────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: kubekitchen-dev
  labels:
    project: kubekitchen
    environment: dev
spec:
  parentRefs:
  - name: kubekitchen-gateway
    namespace: kubekitchen-dev
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    backendRefs:
    - name: auth-service
      namespace: kubekitchen-dev
      port: 4001
---
