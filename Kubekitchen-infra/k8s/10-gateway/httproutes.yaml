---
# Frontend - Catch ALL (/) - MUST BE LAST
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: kubekitchen-dev
spec:
  parentRefs:
    - name: kubekitchen-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          namespace: kubekitchen-dev
          port: 80