---
# Auth Service - matches /api/auth
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: kubekitchen-dev
spec:
  parentRefs:
    - name: kubekitchen-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          namespace: kubekitchen-dev
          port: 4001

