# ─── Frontend Route (catch-all, MUST be last) ─────────────────────────────────
# This must have lower specificity than API routes — Gateway spec guarantees
# longer prefix matches win, so /api/* routes will always be preferred over /
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: kubekitchen-dev
  labels:
    project: kubekitchen
    environment: dev
spec:
  parentRefs:
  - name: kubekitchen-gateway
    namespace: kubekitchen-dev
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      namespace: kubekitchen-dev
      port: 8080