# ─── NodePort Service to expose Contour Envoy proxy on port 30080 ─────────────
#
# When Contour processes a Gateway resource, it creates an Envoy Deployment
# in the same namespace as the Gateway (kubekitchen-dev). The pod is named
# after the Gateway: kubekitchen-gateway-<hash>.
#
# Contour labels its provisioned Envoy pods with:
#   app.kubernetes.io/component: envoy
#   app.kubernetes.io/managed-by: contour
#   gateway.envoyproxy.io is NOT used by Contour (that's Envoy Gateway)
#
# HAProxy on the separate EC2 VM forwards all traffic to worker nodes on
# port 30080, which is then redirected to this Envoy pod on port 80.
#
# ─── NodePort Service: expose kgateway proxy on port 30080 ────────────────────
#
# kgateway provisions a proxy pod in kubekitchen-dev named 'kubekitchen-gateway'.
# Actual pod labels (verified via kubectl --show-labels):
#   app.kubernetes.io/name=kubekitchen-gateway
#   app.kubernetes.io/instance=kubekitchen-gateway
#   kgateway=kube-gateway
#
# HAProxy on the separate EC2 VM forwards all traffic to worker nodes on
# port 30080, which NodePort routes to this kgateway proxy pod on port 8080.
#
apiVersion: v1
kind: Service
metadata:
  name: kubekitchen-gateway-nodeport
  namespace: kubekitchen-dev
  labels:
    project: kubekitchen
    component: gateway-nodeport
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: 8080   # kgateway proxy listens on 8080 for HTTP
    nodePort: 30080    # HAProxy forwards to this port on worker nodes
    protocol: TCP
  # Selector matches the actual kgateway proxy pod labels
  selector:
    kgateway: kube-gateway
