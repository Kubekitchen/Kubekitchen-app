apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kubekitchen-gateway
  namespace: kubekitchen-dev
  labels:
    project: kubekitchen
    environment: dev
spec:
  # Uses Contour as the gateway controller (running in projectcontour namespace)
  gatewayClassName: contour
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    # Allow HTTPRoutes from the same namespace (kubekitchen-dev) to attach
    allowedRoutes:
      namespaces:
        from: Same