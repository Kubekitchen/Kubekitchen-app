apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kubekitchen-gateway
  namespace: kubekitchen-gateway
  labels:
    project: kubekitchen
    component: gateway
spec:
  gatewayClassName: kgateway-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All  # Allow routes from ALL namespaces (dev and prod)