apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: kubekitchen-gwclass
  labels:
    project: kubekitchen
spec:
  controllerName: kgateway.dev/kgateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kubekitchen-gateway
  namespace: kubekitchen-gateway
  labels:
    project: kubekitchen
spec:
  gatewayClassName: kubekitchen-gwclass
  listeners:
    - name: http-dev
      protocol: HTTP
      port: 8082
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              environment: dev
    - name: http-prod
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              environment: prod
