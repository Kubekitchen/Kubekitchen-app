apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kubekitchen-gateway
  namespace: kubekitchen-dev
  labels:
    project: kubekitchen
    environment: dev
spec:
  # kgateway-class confirmed running by pod label:
  # gateway.networking.k8s.io/gateway-class-name=kgateway-class
  gatewayClassName: kgateway-class
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same