apiVersion: v1
kind: Service
metadata:
  name: kgateway-service
  namespace: kubekitchen-gateway
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kgateway
    app.kubernetes.io/component: proxy
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
