# Auth Service Route - DEV
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route-dev
  namespace: kubekitchen-dev
  labels:
    project: kubekitchen
    environment: dev
spec:
  parentRefs:
    - name: kubekitchen-gateway
      namespace: kubekitchen-gateway  # CRITICAL - point to correct gateway namespace
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          namespace: kubekitchen-dev
          port: 4001

