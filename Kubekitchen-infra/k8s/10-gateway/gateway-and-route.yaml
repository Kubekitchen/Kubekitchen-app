---
# Frontend Route - DEV (catch-all, must be last)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route-dev
  namespace: kubekitchen-dev
  labels:
    project: kubekitchen
    environment: dev
spec:
  parentRefs:
    - name: kubekitchen-gateway
      namespace: kubekitchen-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          namespace: kubekitchen-dev
          port: 8080  # Fixed: nginx runs on 8080