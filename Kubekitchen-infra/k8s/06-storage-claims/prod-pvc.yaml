apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-auth-pvc
  namespace: kubekitchen-prod
  labels:
    app: mongodb-auth
    tier: database
    environment: prod
spec:
  storageClassName: kubekitchen-nfs
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
