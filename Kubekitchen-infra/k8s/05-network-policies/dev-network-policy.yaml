# ─── Allow traffic INTO the kgateway proxy pod ────────────────────────────────
# The default-deny-all blocks ALL pods including the kgateway proxy.
# Without this policy, NodePort traffic is dropped before reaching the pod.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: kubekitchen-dev
spec:
  podSelector:
    matchLabels:
      kgateway: kube-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          tier: backend
    ports:
    - protocol: TCP
      port: 4001
    - protocol: TCP
      port: 4002
    - protocol: TCP
      port: 4003
    - protocol: TCP
      port: 4004
  - to:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: kubekitchen-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: kubekitchen-dev
spec:
  podSelector: {}  # Applies to ALL pods including database
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-traffic
  namespace: kubekitchen-dev
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    # Allow Contour's Envoy proxy to reach the frontend pod
    # Contour Envoy runs in the 'projectcontour' namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: projectcontour
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: envoy
      ports:
        - protocol: TCP
          port: 8080
    # Also allow the kubekitchen-dev Envoy proxy (Contour provisions it here)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: envoy
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-traffic
  namespace: kubekitchen-dev
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
        # Allow Contour Envoy proxy (provisioned in kubekitchen-dev) to reach backends
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: envoy
        # Also allow from the shared Contour Envoy in projectcontour namespace
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: projectcontour
          podSelector:
            matchLabels:
              app.kubernetes.io/component: envoy
  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: database
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - protocol: TCP
          port: 4003
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-database-traffic
  namespace: kubekitchen-dev
spec:
  podSelector:
    matchLabels:
      tier: database
  policyTypes:
    - Ingress
    # No Egress needed - DNS handled by allow-dns-egress above
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
        - podSelector:
            matchLabels:
              app: seeder   # Allow seeder job to access databases
      ports:
        - protocol: TCP
          port: 27017