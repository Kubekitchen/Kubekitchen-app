# Only showing frontend fix - all other prod deployments are correct
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kubekitchen-prod
  labels:
    app: frontend
    tier: frontend
    project: kubekitchen
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
        project: kubekitchen
        environment: prod
    spec:
      serviceAccountName: kubekitchen-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      terminationGracePeriodSeconds: 60
      containers:
        - name: frontend
          image: secretpower/kubekitchen-frontend:prod-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080  # Fixed: nginx runs on 8080
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080   # Fixed
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080   # Fixed
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080   # Fixed
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10