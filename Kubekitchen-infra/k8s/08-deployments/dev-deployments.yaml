apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kubekitchen-dev
  labels:
    app: frontend
    tier: frontend
    project: kubekitchen
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
        project: kubekitchen
        environment: dev
    spec:
      serviceAccountName: kubekitchen-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: secretpower/kubekitchen-frontend:dev-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080  # Fixed: nginx runs on 8080
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080   # Fixed: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080   # Fixed: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080   # Fixed: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10