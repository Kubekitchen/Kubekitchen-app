apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kubekitchen-dev
  labels:
    app: auth-service
    tier: backend
    project: kubekitchen
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-service
        tier: backend
        project: kubekitchen
        environment: dev
    spec:
      serviceAccountName: kubekitchen-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-service
          image: secretpower/kubekitchen-auth-service:dev-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: kubekitchen-config
                  key: AUTH_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: kubekitchen-config
                  key: NODE_ENV
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: kubekitchen-config
                  key: JWT_EXPIRES_IN
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: kubekitchen-secrets
                  key: MONGO_AUTH_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kubekitchen-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 25
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
---
