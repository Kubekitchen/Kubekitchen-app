apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubekitchen-sa
  namespace: kubekitchen-dev
  labels:
    project: kubekitchen
    environment: dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubekitchen-sa
  namespace: kubekitchen-prod
  labels:
    project: kubekitchen
    environment: prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubekitchen-role
  namespace: kubekitchen-dev
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubekitchen-role
  namespace: kubekitchen-prod
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubekitchen-rolebinding
  namespace: kubekitchen-dev
subjects:
  - kind: ServiceAccount
    name: kubekitchen-sa
    namespace: kubekitchen-dev
roleRef:
  kind: Role
  name: kubekitchen-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubekitchen-rolebinding
  namespace: kubekitchen-prod
subjects:
  - kind: ServiceAccount
    name: kubekitchen-sa
    namespace: kubekitchen-prod
roleRef:
  kind: Role
  name: kubekitchen-role
  apiGroup: rbac.authorization.k8s.io