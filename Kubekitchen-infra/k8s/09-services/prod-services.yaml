apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kubekitchen-prod
  labels:
    app: auth-service
    tier: backend
    project: kubekitchen
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
      protocol: TCP
      name: http
  type: ClusterIP
