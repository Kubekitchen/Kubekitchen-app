# ─── Auth Service CI/CD Pipeline ───────────────────────────────────────────
name: CI/CD – Auth Service

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'services/auth-service/**'
      - '.github/workflows/ci-auth-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/auth-service/**'

env:
  SERVICE_NAME: auth-service
  IMAGE_NAME: secretpower/kubekitchen-auth-service
  DOCKERFILE_PATH: services/auth-service/Dockerfile
  CONTEXT_PATH: services/auth-service

jobs:
  security-scan:
    name: "1. 🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/security-audit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './services/auth-service'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CI Failed — Security Scan (auth-service)"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CI Pipeline
          body: |
            Security scan FAILED for: auth-service

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build-and-push:
    name: "2. 🐳 Build & Push"
    runs-on: ubuntu-latest
    needs: security-scan
    outputs:
      image_tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate semantic version
        id: version
        run: |
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }} \
            -t ${{ env.IMAGE_NAME }}:dev-latest \
            -f ${{ env.DOCKERFILE_PATH }} \
            ${{ env.CONTEXT_PATH }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:dev-latest

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CI Failed — Docker Build (auth-service)"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CI Pipeline
          body: |
            Docker build/push FAILED for: auth-service

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  approval:
    name: "3. ✋ Approval Gate"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Send Approval Request Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Approval Needed — auth-service → ${{ needs.build-and-push.outputs.image_tag }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CD Pipeline
          body: |
            ════════════════════════════════════════════════════════════
            KubeKitchen — DEPLOYMENT APPROVAL REQUIRED
            ════════════════════════════════════════════════════════════

            Service     : auth-service
            Image Tag   : ${{ needs.build-and-push.outputs.image_tag }}
            Triggered By: ${{ github.actor }}
            Branch      : ${{ github.ref_name }}

            TO APPROVE:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ════════════════════════════════════════════════════════════

      - name: Log Approval
        run: echo "Approved by ${{ github.actor }} at $(date -u)"

  deploy:
    name: "4. 🚀 Update Helm Repo"
    runs-on: ubuntu-latest
    needs: [build-and-push, approval]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Clone Helm repository
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Kubekitchen/Kubekitchen-GitOps.git

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image tag in Helm values
        run: |
          cd Kubekitchen-GitOps/kubekitchen-helm

          echo "📂 Working directory: $(pwd)"

          if [ ! -f "values.yaml" ]; then
            echo "❌ ERROR: values.yaml not found at $(pwd)"
            ls -la
            exit 1
          fi

          echo "📄 Before update:"
          yq e '.["auth-service"].image.tag' values.yaml

          yq e '.["auth-service"].image.tag = "${{ needs.build-and-push.outputs.image_tag }}"' \
            -i values.yaml

          echo "✅ After update:"
          yq e '.["auth-service"].image.tag' values.yaml

      - name: Commit and push to Helm repo
        run: |
          cd Kubekitchen-GitOps

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add kubekitchen-helm/values.yaml

          if git diff --staged --quiet; then
            echo "⚠️ No changes to commit"
            exit 0
          fi

          echo "📝 Changes being committed:"
          git diff --staged

          git commit -m "ci(auth-service): image → ${{ needs.build-and-push.outputs.image_tag }}"

          for i in 1 2 3 4 5; do
            echo "🚀 Push attempt $i/5..."
            git push && echo "✅ Pushed!" && break
            git pull --rebase origin main
            sleep $((i * 2))
          done

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CD ✅ — auth-service deploying ${{ needs.build-and-push.outputs.image_tag }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CD Pipeline
          body: |
            ════════════════════════════════════════════════════
            KubeKitchen CD — Deployment Triggered
            ════════════════════════════════════════════════════

            Service   : auth-service
            New Image : ${{ needs.build-and-push.outputs.image_tag }}

            ArgoCD will auto-sync to cluster within 3 minutes.
            ════════════════════════════════════════════════════

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CD Failed — auth-service"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CD Pipeline
          body: |
            CD manifest update FAILED for: auth-service

            Image Tag : ${{ needs.build-and-push.outputs.image_tag }}
            Author    : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
