# ─── Frontend CI/CD Pipeline ─────────────────────────────────────────────────
name: CI/CD – Frontend

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'services/frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/frontend/**'

env:
  SERVICE_NAME: frontend
  IMAGE_NAME: secretpower/kubekitchen-frontend
  DOCKERFILE_PATH: services/frontend/Dockerfile
  CONTEXT_PATH: services/frontend

jobs:
  security-scan:
    name: "1. 🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/javascript p/react p/security-audit"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true
      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './services/frontend'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CI Failed — Security Scan (frontend)"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CI Pipeline
          body: |
            Security scan FAILED for: frontend
            Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }} | Author: ${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build-and-push:
    name: "2. 🐳 Build & Push"
    runs-on: ubuntu-latest
    needs: security-scan
    outputs:
      image_tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate semantic version
        id: version
        run: echo "tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }} \
            -t ${{ env.IMAGE_NAME }}:dev-latest -f ${{ env.DOCKERFILE_PATH }} ${{ env.CONTEXT_PATH }}
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:dev-latest
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CI Failed — Docker Build (frontend)"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CI Pipeline
          body: |
            Docker build/push FAILED for: frontend
            Branch: ${{ github.ref_name }} | Author: ${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  approval:
    name: "3. ✋ Approval Gate"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Send Approval Request Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Approval Needed — frontend → ${{ needs.build-and-push.outputs.image_tag }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CD Pipeline
          body: |
            KubeKitchen — DEPLOYMENT APPROVAL REQUIRED
            Service: frontend | Tag: ${{ needs.build-and-push.outputs.image_tag }}
            Approve: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - run: echo "Approved by ${{ github.actor }} at $(date -u)"

  deploy:
    name: "4. 🚀 Update Helm Repo"
    runs-on: ubuntu-latest
    needs: [build-and-push, approval]
    if: github.ref == 'refs/heads/main'
    steps:
      - run: git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Kubekitchen/Kubekitchen-GitOps.git
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Update and push
        run: |
          cd Kubekitchen-GitOps
          yq e ".frontend.image.tag = \"${{ needs.build-and-push.outputs.image_tag }}\"" -i values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add . && git diff --staged --quiet && exit 0
          git commit -m "ci(frontend): image → ${{ needs.build-and-push.outputs.image_tag }}"
          for i in 1 2 3 4 5; do git push && break; git pull --rebase origin main; sleep $((i*2)); done
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CD ✅ — frontend deploying ${{ needs.build-and-push.outputs.image_tag }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CD Pipeline
          body: "Service: frontend | Image: ${{ needs.build-and-push.outputs.image_tag }} | ArgoCD will auto-sync."
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CD Failed — frontend"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CD Pipeline
          body: "CD FAILED for frontend | Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
