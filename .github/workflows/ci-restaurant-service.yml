# ─── Restaurant Service CI/CD Pipeline ───────────────────────────────────────
name: CI/CD – Restaurant Service

on:
  push:
    branches: [main, feature/*]
    paths:
      - 'services/restaurant-service/**'
      - '.github/workflows/ci-restaurant-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/restaurant-service/**'

env:
  SERVICE_NAME: restaurant-service
  IMAGE_NAME: secretpower/kubekitchen-restaurant-service
  DOCKERFILE_PATH: services/restaurant-service/Dockerfile
  CONTEXT_PATH: services/restaurant-service

jobs:
  security-scan:
    name: "1. 🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/security-audit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './services/restaurant-service'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CI Failed — Security Scan (restaurant-service)"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CI Pipeline
          body: |
            Security scan FAILED for: restaurant-service

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build-and-push:
    name: "2. 🐳 Build & Push"
    runs-on: ubuntu-latest
    needs: security-scan
    outputs:
      image_tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate semantic version
        id: version
        run: |
          TAG="v1.0.${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }} \
            -t ${{ env.IMAGE_NAME }}:dev-latest \
            -f ${{ env.DOCKERFILE_PATH }} \
            ${{ env.CONTEXT_PATH }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:dev-latest

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CI Failed — Docker Build (restaurant-service)"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CI Pipeline
          body: |
            Docker build/push FAILED for: restaurant-service

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  approval:
    name: "3. ✋ Approval Gate"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Send Approval Request Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Approval Needed — restaurant-service → ${{ needs.build-and-push.outputs.image_tag }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CD Pipeline
          body: |
            ════════════════════════════════════════════════════════════
            KubeKitchen — DEPLOYMENT APPROVAL REQUIRED
            ════════════════════════════════════════════════════════════

            Service     : restaurant-service
            Image Tag   : ${{ needs.build-and-push.outputs.image_tag }}
            Triggered By: ${{ github.actor }}
            Branch      : ${{ github.ref_name }}

            TO APPROVE:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ════════════════════════════════════════════════════════════

      - name: Log Approval
        run: echo "Approved by ${{ github.actor }} at $(date -u)"

  deploy:
    name: "4. 🚀 Update Helm Repo"
    runs-on: ubuntu-latest
    needs: [build-and-push, approval]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Clone Helm repository
        run: git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Kubekitchen/Kubekitchen-GitOps.git

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag in Helm values
        run: |
          cd Kubekitchen-GitOps
          yq e '["restaurant-service"].image.tag = strenv(NEW_TAG)' -i values-dev.yaml
          echo "Updated restaurant-service tag to ${NEW_TAG} in values-dev.yaml"

      - name: Commit and push to Helm repo
        run: |
          cd Kubekitchen-GitOps
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then echo "No changes"; exit 0; fi
          git commit -m "ci(restaurant-service): image → ${{ needs.build-and-push.outputs.image_tag }}"
          for i in 1 2 3 4 5; do git push && break; git pull --rebase origin main; sleep $((i * 2)); done

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CD ✅ — restaurant-service deploying ${{ needs.build-and-push.outputs.image_tag }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CD Pipeline
          body: |
            ════════════════════════════════════════════════════
            KubeKitchen CD — Deployment Triggered
            ════════════════════════════════════════════════════

            Service   : restaurant-service
            New Image : ${{ needs.build-and-push.outputs.image_tag }}

            ArgoCD will auto-sync to cluster within 3 minutes.
            ════════════════════════════════════════════════════

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "KubeKitchen CD Failed — restaurant-service"
          to: ${{ secrets.ALERT_EMAIL }}
          from: KubeKitchen CD Pipeline
          body: |
            CD manifest update FAILED for: restaurant-service

            Image Tag: ${{ needs.build-and-push.outputs.image_tag }}
            Author   : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
