version: "3.8"

networks:
  kubekitchen-net:
    driver: bridge

volumes:
  mongo-auth-data:
  mongo-restaurant-data:
  mongo-order-data:
  mongo-menu-data:

services:
  mongo-auth:
    image: mongo:7
    container_name: mongo-auth
    restart: always
    volumes:
      - mongo-auth-data:/data/db
    networks:
      - kubekitchen-net
    environment:
      MONGO_INITDB_DATABASE: authdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-restaurant:
    image: mongo:7
    container_name: mongo-restaurant
    restart: always
    volumes:
      - mongo-restaurant-data:/data/db
    networks:
      - kubekitchen-net
    environment:
      MONGO_INITDB_DATABASE: restaurantdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-order:
    image: mongo:7
    container_name: mongo-order
    restart: always
    volumes:
      - mongo-order-data:/data/db
    networks:
      - kubekitchen-net
    environment:
      MONGO_INITDB_DATABASE: orderdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-menu:
    image: mongo:7
    container_name: mongo-menu
    restart: always
    volumes:
      - mongo-menu-data:/data/db
    networks:
      - kubekitchen-net
    environment:
      MONGO_INITDB_DATABASE: menudb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: always
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      MONGO_URI: mongodb://mongo-auth:27017/authdb
      JWT_SECRET: supersecretjwtkey123kubekitchen
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
    depends_on:
      mongo-auth:
        condition: service_healthy
    networks:
      - kubekitchen-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile
    container_name: restaurant-service
    restart: always
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      MONGO_URI: mongodb://mongo-restaurant:27017/restaurantdb
      JWT_SECRET: supersecretjwtkey123kubekitchen
      NODE_ENV: production
    depends_on:
      mongo-restaurant:
        condition: service_healthy
    networks:
      - kubekitchen-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  menu-service:
    build:
      context: ./services/menu-service
      dockerfile: Dockerfile
    container_name: menu-service
    restart: always
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      MONGO_URI: mongodb://mongo-menu:27017/menudb
      JWT_SECRET: supersecretjwtkey123kubekitchen
      NODE_ENV: production
    depends_on:
      mongo-menu:
        condition: service_healthy
    networks:
      - kubekitchen-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: always
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      MONGO_URI: mongodb://mongo-order:27017/orderdb
      JWT_SECRET: supersecretjwtkey123kubekitchen
      NODE_ENV: production
    depends_on:
      mongo-order:
        condition: service_healthy
    networks:
      - kubekitchen-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "3000:8080"
    environment:
      NODE_ENV: production
    depends_on:
      - auth-service
      - restaurant-service
      - menu-service
      - order-service
    networks:
      - kubekitchen-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3