services:
  mongo-auth:
    image: mongo:7
    container_name: mongo-auth
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-restaurant:
    image: mongo:7
    container_name: mongo-restaurant
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-menu:
    image: mongo:7
    container_name: mongo-menu
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-order:
    image: mongo:7
    container_name: mongo-order
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: always
    environment:
      PORT: 4001
      MONGO_URI: mongodb://mongo-auth:27017/authdb
      JWT_SECRET: supersecretjwtkey123kubekitchen
      JWT_EXPIRES_IN: 7d
    depends_on:
      mongo-auth:
        condition: service_healthy

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile
    container_name: restaurant-service
    restart: always
    environment:
      PORT: 4002
      MONGO_URI: mongodb://mongo-restaurant:27017/restaurantdb
      JWT_SECRET: supersecretjwtkey123kubekitchen
    depends_on:
      mongo-restaurant:
        condition: service_healthy

  menu-service:
    build:
      context: ./services/menu-service
      dockerfile: Dockerfile
    container_name: menu-service
    restart: always
    environment:
      PORT: 4003
      MONGO_URI: mongodb://mongo-menu:27017/menudb
      JWT_SECRET: supersecretjwtkey123kubekitchen
    depends_on:
      mongo-menu:
        condition: service_healthy

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: always
    environment:
      PORT: 4004
      MONGO_URI: mongodb://mongo-order:27017/orderdb
      JWT_SECRET: supersecretjwtkey123kubekitchen
      MENU_SERVICE_URL: http://menu-service:4003
    depends_on:
      mongo-order:
        condition: service_healthy

  seeder:
    build:
      context: .
      dockerfile: Dockerfile.seeder
    container_name: seeder
    restart: "no"
    environment:
      RESTAURANT_MONGO_URI: mongodb://mongo-restaurant:27017/restaurantdb
      MENU_MONGO_URI: mongodb://mongo-menu:27017/menudb
    depends_on:
      mongo-restaurant:
        condition: service_healthy
      mongo-menu:
        condition: service_healthy

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "3000:8080"
    depends_on:
      - auth-service
      - restaurant-service
      - menu-service
      - order-service