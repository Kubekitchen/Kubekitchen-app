worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Use /tmp for all temp dirs so non-root user can write
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Health check for Kubernetes liveness/readiness probes
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Cache static assets aggressively (Vite adds content hashes to filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA catch-all: serve index.html for all unknown routes
        # API calls (/api/*) are made by the browser JS directly to HAProxy,
        # which forwards them to Contour → backend services.
        # Nginx does NOT proxy API calls — that was only for Docker Compose.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}